<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Apex-Project</title>
</head>
<body>
  <h1>Версия 0.2.2 - Тест звука</h1>
  <button id="start">Start</button>
  <h2 id="output">0</h2>
  <p>Подтягиваний: <span id="counter">0</span></p>
  <div class="modes">
    <button onclick="setMode(45, 12, 'Pull-ups')">Pull-ups (Explosive)</button>
    <button onclick="setMode(25, 10, 'Push-ups')">Push-ups</button>
    <button onclick="setMode(20, 15, 'Squats')">Squats</button>
  </div>
  <h2 id="current-mode">Mode: Pull-ups</h2>
  <script src="script.js"></script>
</body>
</html>
